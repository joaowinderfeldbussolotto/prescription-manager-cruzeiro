# nginx serve o build estático do Vite e faz proxy de /api pro backend.
# É aqui que o cookie de sessão "só funciona": browser fala só com o nginx
# (mesma origem), que repassa /api pro FastAPI.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # arquivos com hash podem ser cacheados agressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: toda rota não-arquivo cai no index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
